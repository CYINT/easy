name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pip-audit ruff
          npm ci
          npx playwright install --with-deps chromium
      - name: Lint
        run: python -m ruff check .
      - name: Frontend syntax check
        run: |
          node --check frontend/src/api.js
          node --check frontend/src/app.js
          node --check scripts/frontend-smoke-qa.mjs
      - name: Python compile check
        run: python -m compileall easy_project boards
      - name: Django check
        run: python manage.py check
      - name: Tests
        run: python manage.py test
      - name: Frontend smoke
        run: npm run qa:frontend
      - name: Dependency audit
        run: python -m pip_audit -r requirements.txt
      - name: Compose config validation
        run: docker compose config
      - name: Container build validation
        run: docker compose build
