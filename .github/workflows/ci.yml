name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          npm ci
          npx playwright install --with-deps chromium
      - name: Lint
        run: python -m ruff check .
      - name: Frontend syntax check
        run: |
          node --check frontend/src/api.js
          node --check frontend/src/app.js
          node --check scripts/frontend-smoke-qa.mjs
          node --check scripts/release-gates.mjs
          node --check scripts/create-release-tag.mjs
      - name: Python compile check
        run: python -m compileall easy_project boards
      - name: Django check
        run: python manage.py check
      - name: Complexity and maintainability gates
        run: python scripts/quality-gates.py
      - name: Tests
        run: |
          python -m coverage run manage.py test
          python -m coverage report
          python -m coverage xml
      - name: Upload coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: true
      - name: Frontend smoke
        run: npm run qa:frontend
      - name: Dependency audit
        run: python -m pip_audit -r requirements.txt
      - name: Compose config validation
        run: docker compose config
      - name: Container build validation
        run: docker compose build
