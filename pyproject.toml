[tool.ruff]
target-version = "py313"
line-length = 140
extend-exclude = [
  "staticfiles",
  "media",
]

[tool.coverage.run]
source = [
  "boards",
  "easy_project",
]
omit = [
  "boards/tests.py",
  "boards/migrations/*",
  "easy_project/asgi.py",
  "easy_project/wsgi.py",
]

[tool.coverage.report]
fail_under = 80
show_missing = true
skip_covered = false

[tool.coverage.xml]
output = "coverage.xml"
