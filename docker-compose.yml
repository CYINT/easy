services:
  easy:
    build: .
    restart: unless-stopped
    env_file:
      - path: ${EASY_ENV_FILE:-C:/Users/Dan/.cyint/easy/easy.env}
        required: false
    command: >
      sh -c "if [ -z \"$${DATABASE_URL:-}\" ]; then
               export POSTGRES_DB=\"$${POSTGRES_DB:-easy}\";
               export POSTGRES_USER=\"$${POSTGRES_USER:-easy}\";
               export POSTGRES_PASSWORD=\"$${POSTGRES_PASSWORD:-change-me}\";
               export DATABASE_URL=\"postgresql://$${POSTGRES_USER}:$${POSTGRES_PASSWORD}@db:5432/$${POSTGRES_DB}\";
             fi &&
             python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn easy_project.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${EASY_BIND_ADDRESS:-127.0.0.1}:${EASY_HOST_PORT:-18082}:8000"
    expose:
      - "8000"
    volumes:
      - easy_media:/app/media

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - path: ${EASY_ENV_FILE:-C:/Users/Dan/.cyint/easy/easy.env}
        required: false
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-easy} -d ${POSTGRES_DB:-easy}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - easy_postgres:/var/lib/postgresql/data

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    profiles:
      - edge
    environment:
      EASY_HOSTNAME: ${EASY_HOSTNAME:-easy.kuzuryu.ai}
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - easy
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  easy_media:
  easy_postgres:
  caddy_data:
  caddy_config:
