coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 2%
    patch:
      default:
        target: 70%
        threshold: 5%

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false

ignore:
  - "boards/tests.py"
  - "boards/migrations/**"
  - "easy_project/asgi.py"
  - "easy_project/wsgi.py"
