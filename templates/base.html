{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Easy{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'easy/app.css' %}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{% url 'boards:home' %}">Easy</a>
    <nav class="nav-links" aria-label="Primary">
      {% if user.is_authenticated %}
        <a href="{% url 'boards:dashboard' %}">Boards</a>
        <a href="/accounts/2fa/">MFA and passkeys</a>
        <form class="logout-form" method="post" action="{% url 'account_logout' %}">
          {% csrf_token %}
          <button type="submit">Sign out</button>
        </form>
      {% else %}
        <a href="{% url 'account_login' %}">Sign in</a>
        <a class="button-link" href="{% url 'account_signup' %}">Create account</a>
      {% endif %}
    </nav>
  </header>

  {% if messages %}
    <aside class="messages" aria-live="polite">
      {% for message in messages %}
        <div class="message {{ message.tags }}">{{ message }}</div>
      {% endfor %}
    </aside>
  {% endif %}

  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
